name: Build & Release UVITRepo plugin

# Triggered when a GitHub release is published. The workflow builds
# UVITRepo.plugin, wraps it in a signed + notarized .pkg, and attaches
# the .pkg to the release.
#
# SECRETS (sensitive — Settings > Secrets and variables > Actions > Secrets):
#   MACOS_DEV_ID_APP_P12         — Developer ID Application cert, base64-encoded .p12
#   MACOS_DEV_ID_APP_PASSWORD    — passphrase for the Application .p12
#   MACOS_DEV_ID_INST_P12        — Developer ID Installer cert, base64-encoded .p12
#   MACOS_DEV_ID_INST_PASSWORD   — passphrase for the Installer .p12
#   MACOS_NOTARIZE_APPLE_ID      — Apple ID used for notarization
#   MACOS_NOTARIZE_PASSWORD      — app-specific password for notarytool
#
# VARIABLES (non-sensitive, publicly visible anyway — Actions > Variables):
#   MACOS_DEV_ID_APP_NAME        — "Developer ID Application: EigerCode GmbH (TEAMID)"
#   MACOS_DEV_ID_INST_NAME       — "Developer ID Installer: EigerCode GmbH (TEAMID)"
#   MACOS_NOTARIZE_TEAM_ID       — Apple Developer Team ID (e.g. J538HP6KK5)
#
# Same values as uvit-agent/uvit-hub-mac. Prefer org-level, scoped to the
# signing repos.
#
# Without these secrets the workflow still builds and attaches an unsigned .pkg
# (suitable for internal testing on your own fleet).

on:
  release:
    types: [published]

permissions:
  contents: write   # needed to upload release assets

jobs:
  build:
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Git hygiene (self-hosted runner)
        run: |
          git config --global --get-regexp 'url\..*\.insteadof' 2>/dev/null \
            | awk '{print $1}' | while read -r k; do git config --global --unset-all "$k" || true; done
          true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Developer ID certs
        if: env.MACOS_DEV_ID_APP_P12 != ''
        env:
          MACOS_DEV_ID_APP_P12: ${{ secrets.MACOS_DEV_ID_APP_P12 }}
          MACOS_DEV_ID_APP_PASSWORD: ${{ secrets.MACOS_DEV_ID_APP_PASSWORD }}
          MACOS_DEV_ID_INST_P12: ${{ secrets.MACOS_DEV_ID_INST_P12 }}
          MACOS_DEV_ID_INST_PASSWORD: ${{ secrets.MACOS_DEV_ID_INST_PASSWORD }}
        run: |
          set -e
          KEYCHAIN="$RUNNER_TEMP/build-${GITHUB_RUN_ID}.keychain-db"
          KEYCHAIN_PW=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 7200 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

          echo "$MACOS_DEV_ID_APP_P12"  | base64 -d > "$RUNNER_TEMP/dev_id_app.p12"
          echo "$MACOS_DEV_ID_INST_P12" | base64 -d > "$RUNNER_TEMP/dev_id_inst.p12"

          security import "$RUNNER_TEMP/dev_id_app.p12"  -k "$KEYCHAIN" \
            -P "$MACOS_DEV_ID_APP_PASSWORD"  -T /usr/bin/codesign -T /usr/bin/productsign
          security import "$RUNNER_TEMP/dev_id_inst.p12" -k "$KEYCHAIN" \
            -P "$MACOS_DEV_ID_INST_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"

          rm -f "$RUNNER_TEMP/dev_id_app.p12" "$RUNNER_TEMP/dev_id_inst.p12"
          echo "SIGNING_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PW=$KEYCHAIN_PW"   >> "$GITHUB_ENV"

      - name: Build UVITRepo.plugin
        run: |
          set -e
          rm -rf build
          xcodebuild build \
            -project UVITRepo.xcodeproj \
            -configuration Release \
            -scheme UVITRepo \
            -destination "generic/platform=macOS" \
            -derivedDataPath build

      - name: Sign dylib with Developer ID Application
        if: env.MACOS_DEV_ID_APP_NAME != ''
        env:
          MACOS_DEV_ID_APP_NAME: ${{ vars.MACOS_DEV_ID_APP_NAME }}
        run: |
          set -e
          codesign \
            --sign "$MACOS_DEV_ID_APP_NAME" \
            --options runtime \
            --timestamp \
            --force \
            build/Build/Products/Release/UVITRepo.plugin
          codesign --verify --verbose build/Build/Products/Release/UVITRepo.plugin

      - name: Assemble installer .pkg
        env:
          MACOS_DEV_ID_APP_NAME: ${{ vars.MACOS_DEV_ID_APP_NAME }}
        run: |
          set -e
          VERSION="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present (e.g. v1.0.0 → 1.0.0)
          VERSION="${VERSION#v}"

          mkdir -p payload/usr/local/munki/repoplugins
          # ditto preserves the bundle (and any signature); plain cp of a bundle is unsafe.
          ditto build/Build/Products/Release/UVITRepo.plugin \
                payload/usr/local/munki/repoplugins/UVITRepo.plugin
          chmod -R 755 payload
          # Strip extended attributes/resource forks — a common cause of notary
          # rejecting an otherwise-valid signature ("The binary is not signed").
          xattr -cr payload/usr/local/munki/repoplugins/UVITRepo.plugin
          # Re-sign the plugin IN its final payload location so the packaged binary
          # is definitely Developer ID + hardened-runtime signed (notarization
          # rejected an unsigned inner binary otherwise).
          if [ -n "$MACOS_DEV_ID_APP_NAME" ]; then
            codesign --force --options runtime --timestamp \
              --sign "$MACOS_DEV_ID_APP_NAME" \
              payload/usr/local/munki/repoplugins/UVITRepo.plugin
            codesign -dvvv payload/usr/local/munki/repoplugins/UVITRepo.plugin 2>&1 \
              | grep -iE "Authority|TeamIdentifier|flags|Signature|Identifier" || true
            codesign --verify --strict --verbose=2 \
              payload/usr/local/munki/repoplugins/UVITRepo.plugin
          fi

          pkgbuild \
            --root payload \
            --identifier ch.eigercode.uvit.UVITRepo \
            --version "$VERSION" \
            --ownership recommended \
            UVITRepo-unsigned.pkg

          echo "PKG_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Sign installer .pkg with Developer ID Installer
        if: env.MACOS_DEV_ID_INST_NAME != ''
        env:
          MACOS_DEV_ID_INST_NAME: ${{ vars.MACOS_DEV_ID_INST_NAME }}
        run: |
          set -e
          productsign \
            --sign "$MACOS_DEV_ID_INST_NAME" \
            --timestamp \
            UVITRepo-unsigned.pkg \
            "UVITRepo-${{ env.PKG_VERSION }}.pkg"

      - name: Use unsigned pkg if signing was skipped
        # vars context, NOT env: the sign step's step-level env is invisible
        # here, so an env check was always empty and this cp overwrote the
        # signed pkg with the unsigned one (v0.1.4 notary "not signed").
        if: vars.MACOS_DEV_ID_INST_NAME == ''
        run: |
          cp UVITRepo-unsigned.pkg "UVITRepo-${{ env.PKG_VERSION }}.pkg"

      - name: Notarize pkg
        if: env.MACOS_NOTARIZE_APPLE_ID != ''
        env:
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_PASSWORD: ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          MACOS_NOTARIZE_TEAM_ID: ${{ vars.MACOS_NOTARIZE_TEAM_ID }}
        run: |
          set -e
          SUB=$(xcrun notarytool submit \
            "UVITRepo-${{ env.PKG_VERSION }}.pkg" \
            --apple-id  "$MACOS_NOTARIZE_APPLE_ID" \
            --password  "$MACOS_NOTARIZE_PASSWORD" \
            --team-id   "$MACOS_NOTARIZE_TEAM_ID" \
            --wait --output-format json 2>&1) || true
          echo "$SUB"
          ID=$(echo "$SUB" | python3 -c "import sys,json;print(json.load(sys.stdin).get('id',''))" 2>/dev/null || true)
          STATUS=$(echo "$SUB" | python3 -c "import sys,json;print(json.load(sys.stdin).get('status',''))" 2>/dev/null || true)
          echo "notary status: $STATUS (id $ID)"
          if [ -n "$ID" ]; then
            echo "=== notary log ==="
            xcrun notarytool log "$ID" \
              --apple-id "$MACOS_NOTARIZE_APPLE_ID" \
              --password "$MACOS_NOTARIZE_PASSWORD" \
              --team-id  "$MACOS_NOTARIZE_TEAM_ID" || true
          fi
          if [ "$STATUS" = "Accepted" ]; then
            xcrun stapler staple "UVITRepo-${{ env.PKG_VERSION }}.pkg"
          else
            echo "::warning::Notarization not Accepted ($STATUS). Attaching the signed but un-notarized .pkg. See the notary log above."
          fi

      - name: Attach .pkg to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "UVITRepo-${{ env.PKG_VERSION }}.pkg"

      - name: Clean up keychain
        if: always() && env.SIGNING_KEYCHAIN != ''
        run: |
          security delete-keychain "$SIGNING_KEYCHAIN" || true
